model:
  base_model: "nlpaueb/legal-bert-base-uncased"
  max_seq_length: 512
  num_labels: 41  # CUAD has 41 clause-type categories

training:
  batch_size: 16
  eval_batch_size: 32
  learning_rate: 2.0e-5
  weight_decay: 0.01
  num_epochs: 5
  warmup_ratio: 0.1
  fp16: true
  gradient_accumulation_steps: 2
  save_strategy: "epoch"
  eval_strategy: "epoch"
  load_best_model_at_end: true
  metric_for_best_model: "f1"

wandb:
  project: "contract-intelligence"
  entity: "chennamdilip1-bur"
  tags: ["legal-bert", "cuad", "clause-classification"]

paths:
  data_dir: "./data"
  model_dir: "./models"
  output_dir: "./models/checkpoints"
  final_model_dir: "./models/final"
